---
# ---------------------------------------------------------------------------
# date and time
# ---------------------------------------------------------------------------
- intent:
    name: HassGetCurrentTime
  sentences:
    - "what time is it"

- intent:
    name: HassGetCurrentDate
  sentences:
    - "what's the date"

# ---------------------------------------------------------------------------
# timers
# ---------------------------------------------------------------------------
- intent:
    name: HassStartTimer
    slots:
      hours: "{{duration.total_seconds() // 3600}}"
      minutes: "{{(duration.total_seconds() % 3600) // 60}}"
      seconds: "{{duration.total_seconds() % 60}}"
  duration: true
  sentences:
    - "set a timer for 10 seconds"
    - "10 minute timer"
    - "start timer for ten hours"

- intent:
    name: HassPauseTimer
  sentences:
    - "pause timer"

- intent:
    name: HassUnpauseTimer
  sentences:
    - "resume timer"

- intent:
    name: HassCancelTimer
  sentences:
    - "cancel timer"

- intent:
    name: HassTimerStatus
  sentences:
    - "timer status"
    - "how much time is left on the timer"

# ---------------------------------------------------------------------------
# lights
# ---------------------------------------------------------------------------
- intent:
    name: HassTurnOn
    slots:
      domain: light
  context_area: true
  sentences:
    - "turn on the lights"
    - "lights on"

- intent:
    name: HassTurnOff
    slots:
      domain: light
  context_area: true
  sentences:
    - "turn off the lights"
    - "lights off"

- intent:
    name: HassLightSet
    slots:
      brightness: "{{ number }}"
  number: true
  context_area: true
  sentences:
    - "set brightness to 10 percent"
    - "light brightness 50%"
    - "lights twenty five percent brightness"

# TODO: color
# https://github.com/OpenVoiceOS/ovos-color-parser

# ---------------------------------------------------------------------------
# media
# ---------------------------------------------------------------------------
- intent:
    name: HassMediaPause
  context_area: true
  sentences:
    - "pause"
    - "pause the music"
    - "pause TV"

- intent:
    name: HassMediaUnpause
  context_area: true
  sentences:
    - "resume"
    - "resume the music"
    - "unpause music"

- intent:
    name: HassMediaNext
  context_area: true
  sentences:
    - "next"
    - "skip to the next track"
    - "skip this song"

- intent:
    name: HassSetVolumeRelative
    slots:
      volume_step: "up"
  context_area: true
  sentences:
    - "volume up"
    - "turn up the volume"
    - "make the music louder"

- intent:
    name: HassSetVolumeRelative
    slots:
      volume_step: "{{number}}"
  context_area: true
  number: true
  sentences:
    - "volume up by 10%"
    - "turn up the volume by fifty percent"
    - "make the music louder by 25 percent"

- intent:
    name: HassSetVolumeRelative
    slots:
      volume_step: "down"
  context_area: true
  sentences:
    - "volume down"
    - "turn down the volume"
    - "make the music quieter"

- intent:
    name: HassSetVolumeRelative
    slots:
      volume_step: "{{-number}}"
  context_area: true
  number: true
  sentences:
    - "volume down by 10%"
    - "turn down the volume by fifty percent"
    - "make the music quieter by 25 percent"

- intent:
    name: HassSetVolume
    slots:
      volume_level: "{{number}}"
  context_area: true
  number: true
  sentences:
    - "set volume to 10%"
    - "set music volume to fifty percent"
    - "volume 25 percent"

# ---------------------------------------------------------------------------
# weather and temperature
# ---------------------------------------------------------------------------
- intent:
    name: HassGetWeather
  sentences:
    - "what is the weather today"
    - "tell me the weather forecast"
    - "how's the weather"

- intent:
    name: HassClimateGetTemperature
  sentences:
    - "what is the temperature"
    - "what's the temperature in the house"

# ---------------------------------------------------------------------------
# miscellaneous
# ---------------------------------------------------------------------------
- intent:
    name: HassNevermind
  sentences:
    - "nevermind"
