---
# -----------------------------------------------------------------------------
# date and time
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: HassGetCurrentTime
      description: Get the current time
- tool:
    type: function
    function:
      name: HassGetCurrentDate
      description: Get the current date

# -----------------------------------------------------------------------------
# timers
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: start_timer
      description: Start a timer with a duration, optionally with a name
      parameters:
        type: object
        properties:
          total_seconds:
            type: integer
            minimum: 0
          name:
            type: string
            description: Name of the timer
        required:
          - total_seconds
  intent:
    name: HassStartTimer
    slots:
      hours: "{{ total_seconds // 3600 }}"
      minutes: "{{ (total_seconds % 3600) // 60 }}"
      seconds: "{{ total_seconds % 60 }}"
      name: "{{ name | default(none) }}"

- tool:
    type: function
    function:
      name: control_timer
      description: Pause, resume, or cancel a timer, optionally by name
      parameters:
        type: object
        properties:
          action:
            type: string
            enum:
              - pause
              - resume
              - cancel
          name:
            type: string
            description: Name of the timer
        required:
          - action
  intent:
    name: >-
      {% if action == 'pause' %}
      HassPauseTimer
      {% elif action == 'resume' %}
      HassUnpauseTimer
      {% elif action == 'cancel' %}
      HassCancelTimer
      {% endif %}

- tool:
    type: function
    function:
      name: HassTimerStatus
      description: Get the time remaining for all timers or one timer by name
      parameters:
        type: object
        properties:
          name:
            type: string
            description: Name of the timer

# -----------------------------------------------------------------------------
# lights
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: lights_on_off
      description: Turn the lights on or off in the current area or a specific location
      parameters:
        type: object
        properties:
          action:
            type: string
            enum:
              - "on"
              - "off"
          location:
            type: string
            description: Location name like office or upstairs
        required:
          - action
  intent:
    name: >-
      {% if action == 'on' %}
      HassTurnOn
      {% elif action == 'off' %}
      HassTurnOff
      {% endif %}
    slots:
      domain: light
      area: "{% if area %}{{ area.area_id }}{% endif %}"
      floor: "{% if floor %}{{ floor.floor_id }}{% endif %}"

- tool:
    type: function
    function:
      name: set_light_property
      description: Set the brightness or color of the lights in the current area or in a specific location
      parameters:
        type: object
        properties:
          brightness:
            type: integer
            minimum: 0
            maximum: 100
            description: Brightness percentage
          color:
            type: string
            description: Color name like red or blue
          location:
            type: string
            description: Location name like office or upstairs
  intent:
    name: HassLightSet
    slots:
      brightness: "{{ brightness | default(none) }}"
      color: "{{ color | default(none) }}"
      area: "{% if area %}{{ area.area_id }}{% endif %}"
      floor: "{% if floor %}{{ floor.floor_id }}{% endif %}"

# -----------------------------------------------------------------------------
# devices
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: device_on_off
      description: Turn a device on or off by name
      parameters:
        type: object
        properties:
          action:
            type: string
            enum:
              - "on"
              - "off"
          device_name:
            type: string
            description: Full name of the device
        required:
          - action
          - device_name
  intent:
    name: >-
      {% if action == 'on' %}
      HassTurnOn
      {% elif action == 'off' %}
      HassTurnOff
      {% endif %}
    slots:
      name: "{{ entity.entity_id }}"
  name_domains:
    - light
    - switch
    - fan
    - media_player
    - input_boolean

- tool:
    type: function
    function:
      name: cover_open_close
      description: Open or close a device by name
      parameters:
        type: object
        properties:
          action:
            type: string
            enum:
              - open
              - close
          device_name:
            type: string
            description: Full name of the device
        required:
          - action
          - device_name
  intent:
    name: >-
      {% if action == 'open' %}
      HassTurnOn
      {% elif action == 'close' %}
      HassTurnOff
      {% endif %}
    slots:
      name: "{{ entity.entity_id }}"
  name_domains:
    - cover
    - valve

- tool:
    type: function
    function:
      name: lock_unlock
      description: Lock or unlock a device by name
      parameters:
        type: object
        properties:
          action:
            type: string
            enum:
              - lock
              - unlock
          device_name:
            type: string
            description: Full name of the device
        required:
          - action
          - device_name
  intent:
    name: >-
      {% if action == 'lock' %}
      HassTurnOn
      {% elif action == 'unlock' %}
      HassTurnOff
      {% endif %}
    slots:
      name: "{{ entity.entity_id }}"
  name_domains:
    - lock

- tool:
    type: function
    function:
      name: set_position
      description: Set the position of a device like a door or window by percentage
      parameters:
        type: object
        properties:
          device_name:
            type: string
            description: Full name of the device
          position:
            type: integer
            minimum: 0
            maximum: 100
            description: Position percentage
        required:
          - device_name
          - position
  intent:
    name: HassSetPosition
    slots:
      name: "{{ entity.entity_id }}"
      position: "{{ position }}"
  name_domains:
    - cover
    - valve

- tool:
    type: function
    function:
      name: set_speed
      description: Set the speed of a fan by percentage
      parameters:
        type: object
        properties:
          device_name:
            type: string
            description: Full name of the fan
          speed:
            type: integer
            minimum: 0
            maximum: 100
            description: Speed percentage
        required:
          - device_name
          - position
  intent:
    name: HassFanSetSpeed
    slots:
      name: "{{ entity.entity_id }}"
      speed: "{{ speed }}"

# -----------------------------------------------------------------------------
# media
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: control_media
      description: Pause, resume, or skip to the next track on a media player, optionally by name
      parameters:
        type: object
        properties:
          device_name:
            type: string
            description: Full name of the media player
          action:
            type: string
            enum:
              - pause
              - resume
              - next
        required:
          - action
  intent:
    name: >-
      {% if action == 'pause' %}
      HassMediaPause
      {% elif action == 'resume' %}
      HassMediaUnpause
      {% elif action == 'next' %}
      HassMediaNext
      {% endif %}
    slots:
      name: "{% if entity %}{{ entity.entity_id }}{% endif %}"
  name_domains:
    - media_player

- tool:
    type: function
    function:
      name: media_volume
      description: Increase, decrease, or set volume percentage of a media player, optionally by name
      parameters:
        type: object
        properties:
          device_name:
            type: string
            description: Full name of the media player
          action:
            type: string
            enum:
              - increase
              - decrease
              - set
          target:
            type: string
            description: Device or area name
          volume:
            type: integer
            minimum: 0
            maximum: 100
        required:
          - action
  intent:
    name: >-
      {% if action in ('increase', 'decrease') %}
      HassSetVolumeRelative
      {% elif action == 'set' %}
      HassSetVolume
      {% endif %}
    slots:
      name: "{% if entity %}{{ entity.entity_id }}{% endif %}"
      volume_level: "{% if action == 'set' %}{{ volume }}{% endif %}"
      volume_step: "{% if action == 'increase' %}up{% elif action == 'decrease' %}down{% endif %}"
  name_domains:
    - media_player

- tool:
    type: function
    function:
      name: play_music
      description: Search for music and play it
      parameters:
        type: object
        properties:
          search_query:
            type: string
          media_class:
            type: string
            description: Class of media to search for or other if not known
            enum:
              - artist
              - album
              - track
              - other
        required:
          - search_query
  intent:
    name: HassMediaSearchAndPlay
    slots:
      search_query: "{{ search_query }}"
      media_class: "{% if media_class != 'other' %}{{ media_class }}{% endif %}"

