---
# -----------------------------------------------------------------------------
# date and time
# - what time is it?
# - what's the date?
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: HassGetCurrentTime
      description: Get the current time
- tool:
    type: function
    function:
      name: HassGetCurrentDate
      description: Get the current date

# -----------------------------------------------------------------------------
# timers
# - start a 30 minute timer for pizza
# - pause/resume/cancel pizza timer
# - timer status
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: start_timer
      description: Start a timer with a duration
      parameters:
        type: object
        properties:
          total_seconds:
            type: integer
            minimum: 0
          # name:
          #   type: string
          #   description: Name of the timer
        required:
          - total_seconds
  intent:
    name: HassStartTimer
    slots:
      hours: "{{total_seconds // 3600}}"
      minutes: "{{(total_seconds % 3600) // 60}}"
      seconds: "{{total_seconds % 60}}"
      # name: "{{name | default(none)}}"

- tool:
    type: function
    function:
      name: control_timer
      description: Pause, resume, or cancel a timer
      parameters:
        type: object
        properties:
          action:
            type: string
            enum:
              - pause
              - resume
              - cancel
          # name:
          #   type: string
          #   description: Name of the timer
        required:
          - action
  intent:
    name: >-
      {%- if action == 'pause'-%}
      HassPauseTimer
      {%- elif action == 'resume'-%}
      HassUnpauseTimer
      {%- elif action == 'cancel'-%}
      HassCancelTimer
      {%- endif-%}

- tool:
    type: function
    function:
      name: HassTimerStatus
      description: Get the time remaining for all timers
      # parameters:
      #   type: object
      #   properties:
      #     name:
      #       type: string
      #       description: Name of the timer

# -----------------------------------------------------------------------------
# lights
# - turn on/off the lights
# - set brightness to 50%
# - set color to red
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: lights_on_off
      description: Turn the lights on or off in the current area
      parameters:
        type: object
        properties:
          action:
            type: string
            enum:
              - "on"
              - "off"
          # location:
          #   type: string
          #   description: Location name like office or upstairs
        required:
          - action
  intent:
    name: >-
      {%- if action == 'on'-%}
      HassTurnOn
      {%- elif action == 'off'-%}
      HassTurnOff
      {%- endif-%}
    slots:
      domain: light
      # area: "{%- if area-%}{{area.area_id}}{% endif %}"
      # floor: "{%- if floor-%}{{floor.floor_id}}{% endif %}"
  context_area: true

- tool:
    type: function
    function:
      name: set_light_property
      description: Set the brightness or color of the lights in the current area
      parameters:
        type: object
        properties:
          brightness:
            type: integer
            minimum: 0
            maximum: 100
            description: Brightness percentage
          color:
            type: string
            description: Color name like red or blue (always in English)
          # location:
          #   type: string
          #   description: Location name like office or upstairs
  intent:
    name: HassLightSet
    slots:
      brightness: "{{brightness | default(none)}}"
      color: "{{color | default(none)}}"
      # area: "{%- if area-%}{{area.area_id}}{% endif %}"
      # floor: "{%- if floor-%}{{floor.floor_id}}{% endif %}"
  context_area: true

