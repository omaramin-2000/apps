# -----------------------------------------------------------------------------
# media
# - pause/resume the music
# - next track
# - set volume to 50%
# - increase/decrease volume
# - increase/decrease volume by 50%
# - play the beatles
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: control_media
      description: Pause, resume, or skip to the next track on a media player
      parameters:
        type: object
        properties:
          # device_name:
          #   type: string
          #   description: Full name of the media player
          action:
            type: string
            enum:
              - pause
              - resume
              - next
        required:
          - action
  intent:
    name: >-
      {%- if action == 'pause'-%}
      HassMediaPause
      {%- elif action == 'resume'-%}
      HassMediaUnpause
      {%- elif action == 'next'-%}
      HassMediaNext
      {%- endif-%}
  #   slots:
  #     name: "{%- if entity-%}{{entity.entity_id}}{% endif %}"
  # name_domains:
  #   - media_player
  context_area: true

- tool:
    type: function
    function:
      name: media_volume
      description: Increase, decrease, or set volume percentage of a media player
      parameters:
        type: object
        properties:
          # device_name:
          #   type: string
          #   description: Full name of the media player
          action:
            type: string
            enum:
              - increase
              - decrease
              - set
          # target:
          #   type: string
          #   description: Device or area name
          volume:
            type: integer
            minimum: 0
            maximum: 100
        required:
          - action
  intent:
    name: >-
      {%- if action in ('increase', 'decrease')-%}
      HassSetVolumeRelative
      {%- elif action == 'set'-%}
      HassSetVolume
      {%- endif-%}
    slots:
      # name: "{%- if entity-%}{{entity.entity_id}}{% endif %}"
      volume_level: "{%- if action == 'set'-%}{{volume | int}}{% endif %}"
      volume_step: >-
        {%- if action == 'increase' -%}
        {%- if volume is defined -%}
        {{(volume | int)}}
        {%- else -%}
        up
        {%- endif -%}
        {%- elif action == 'decrease' -%}
        {%- if volume is defined -%}
        {{(-(volume | int))}}
        {%- else -%}
        down
        {%- endif -%}
        {%- endif -%}
  # name_domains:
  #   - media_player
  context_area: true

- tool:
    type: function
    function:
      name: play_music
      description: Search for music and play it
      parameters:
        type: object
        properties:
          search_query:
            type: string
          media_class:
            type: string
            description: Class of media to search for or other if not known
            enum:
              - artist
              - album
              - track
              - other
        required:
          - search_query
  intent:
    name: HassMediaSearchAndPlay
    slots:
      search_query: "{{search_query}}"
      media_class: "{%- if media_class != 'other'-%}{{media_class}}{% endif %}"
  context_area: true

