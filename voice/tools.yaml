# -----------------------------------------------------------------------------
# todo and shopping list
# - add clean the garage on my todo list
# - complete clean the garage on my todo list
# - remove clean the garage from my todo list
# - add apples and bananas to the shopping list
# - check apples off the shopping list
# -----------------------------------------------------------------------------
- tool:
    type: function
    function:
      name: update_todo
      description: Add, complete, or remove a task on the todo list. Multiple items should be split into multiple tool calls.
      parameters:
        type: object
        properties:
          item:
            type: string
          action:
            type: string
            enum:
              - add
              - complete
              - remove
          list_name:
            type: string
            description: Name of the list
        required:
          - action
          - item
          - list_name
  intent:
    name: >-
      {%- if action == 'add'-%}
      HassListAddItem
      {%- elif action == 'complete'-%}
      HassListCompleteItem
      {%- elif action == 'remove'-%}
      HassListRemoveItem
      {%- endif-%}
    slots:
      name: "{{entity.entity_id}}"
      item: "{{item}}"
  name_domains:
    - todo

- tool:
    type: function
    function:
      name: update_shopping_list
      description: Add or complete a single item on the shopping list. Multiple items should be split into multiple tool calls.
      parameters:
        type: object
        properties:
          item:
            type: string
          action:
            type: string
            enum:
              - add
              - complete
              - remove
        required:
          - item
  intent:
    name: >-
      {%- if action == 'add'-%}
      HassShoppingListAddItem
      {%- elif action in ('complete', 'remove')-%}
      HassShoppingListCompleteItem
      {%- endif-%}
    slots:
      item: "{{item}}"

